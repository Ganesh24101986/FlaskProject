<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark px-4 py-3 mb-4">
        <span class="navbar-brand fw-bold fs-5">
            <i class="bi bi-people-fill me-2"></i>Employee Management System
        </span>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">

                <!-- Breadcrumb -->
                <nav aria-label="breadcrumb" class="mb-3">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item">
                            <a href="{{ url_for('index') }}" class="text-decoration-none">
                                <i class="bi bi-house me-1"></i>Employees
                            </a>
                        </li>
                        <li class="breadcrumb-item active">Edit Employee</li>
                    </ol>
                </nav>

                <div class="card">
                    <!-- Card Header -->
                    <div class="card-header-custom card-header-orange">
                        <div class="d-flex align-items-center justify-content-between">
                            <div>
                                <h5 class="text-white fw-bold mb-0">
                                    <i class="bi bi-pencil-square me-2"></i>Edit Employee
                                </h5>
                                <p class="text-white-50 mb-0 small mt-1">Update the employee details below.</p>
                            </div>
                            <span class="emp-id-badge">#{{ employee[0] }}</span>
                        </div>
                    </div>

                    <!-- Card Body -->
                    <div class="card-body p-4">
                        <form action="/update/{{ employee[0] }}" method="POST">

                            <div class="mb-4">
                                <label for="name" class="form-label">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control form-control-orange" id="name" name="name"
                                           value="{{ employee[1] }}" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="department" class="form-label">Department</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-building"></i></span>
                                    <input type="text" class="form-control form-control-orange" id="department" name="department"
                                           value="{{ employee[2] }}" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="salary" class="form-label">Salary (&#8377;)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-currency-rupee"></i></span>
                                    <input type="number" class="form-control form-control-orange" id="salary" name="salary"
                                           value="{{ employee[3] }}" min="0" required>
                                </div>
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-submit-orange flex-grow-1">
                                    <i class="bi bi-check-circle me-2"></i>Update Employee
                                </button>
                                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary px-4">
                                    <i class="bi bi-arrow-left me-1"></i>Cancel
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
